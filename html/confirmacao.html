<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Compra Confirmada</title>
    <link rel="stylesheet" href="../css/style.css">

    <style>
        body {
            background: #f5f5f5;
        }

        .comprovante {
            max-width: 600px;
            margin: 40px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .comprovante h2 {
            text-align: center;
        }

        .comprovante p {
            margin: 8px 0;
        }

        .btn {
            padding: 10px 15px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: white;
        }

        .btn:hover {
            background: #0056b3;
        }

        @media print {
            button {
                display: none;
            }
        }
    </style>
</head>

<body>

<!-- MENU -->
<nav>
    <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="produtos.html">Produtos</a></li>
        <li>
            <a href="carrinho.html">
                Carrinho (<span id="contador-carrinho">0</span>)
            </a>
        </li>
        <li><a href="ofertas.html">Ofertas</a></li>
    </ul>
</nav>

<!-- COMPROVANTE -->
<div class="comprovante">

    <h2>🏪 TechStore</h2>
<p style="text-align:center; font-size:14px; color:gray;">
    Tecnologia de ponta para você
</p>

<hr>

<h3 style="text-align:center;">🎉 Compra Confirmada</h3>

<p id="pedido" style="text-align:center; font-weight:bold;"></p>

<hr>

<h4>📦 Dados da Compra</h4>
<p><strong>Cliente:</strong> Cliente TechStore</p>
<p><strong>Forma de pagamento:</strong> <span id="pagamento"></span></p>
<p><strong>Prazo de entrega:</strong> 5 a 7 dias úteis</p>
<p><strong>Garantia:</strong> 12 meses</p>

<hr>

<h4>🛒 Itens</h4>
<ul id="itens"></ul>

<h3 id="total"></h3>

    <h3 id="total"></h3>

    <div style="text-align:center;">
        <button class="btn" onclick="window.print()">🖨️ Imprimir</button>

        <a href="index.html">
            <button class="btn">Voltar para Home</button>
        </a>
    </div>

</div>

<script src="../js/script.js"></script>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

// carregar itens
function carregarComprovante() {
    let lista = document.getElementById("itens");
    let totalElemento = document.getElementById("total");

    let total = 0;

    carrinho.forEach(produto => {
        let item = document.createElement("li");

        item.textContent =
            produto.nome + " - R$ " +
            produto.preco.toLocaleString("pt-BR", {
                minimumFractionDigits: 2
            });

        lista.appendChild(item);

        total += produto.preco;
    });

    totalElemento.textContent =
        "Total: R$ " +
        total.toLocaleString("pt-BR", {
            minimumFractionDigits: 2
        });
}

// gerar número do pedido
function gerarPedido() {
    let numero = Math.floor(Math.random() * 100000);

    document.getElementById("pedido").textContent =
        "Número do pedido: #" + numero;
}

// EXECUÇÃO CORRETA
gerarPedido();
carregarComprovante();

// 🔥 LIMPA O CARRINHO SOMENTE AQUI
localStorage.removeItem("carrinho");
</script>

</body>
</html>
